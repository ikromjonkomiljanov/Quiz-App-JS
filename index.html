<!doctype html>
<html lang="uz" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizMaster - Bilimingni sinab ko'r</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <div id="homeScreen" class="screen active">
        <h1>Kategoriyani tanlang</h1>
        <div class="category-grid">
          <div class="cat-card" data-cat="html">
            <span class="cat-icon">🎨</span>
            <h3>HTML & CSS</h3>
          </div>
          <div class="cat-card" data-cat="js">
            <span class="cat-icon">⚡</span>
            <h3>JavaScript</h3>
          </div>
          <div class="cat-card" data-cat="general">
            <span class="cat-icon">🌍</span>
            <h3>Umumiy</h3>
          </div>
        </div>
        <button id="startBtn" disabled>Boshlash</button>
      </div>

      <div id="quizScreen" class="screen">
        <div class="quiz-header">
          <span id="qCounter">Savol 0/0</span>
        </div>

        <div class="question-card">
          <h2 id="qText">Savol bu yerda ko'rinadi</h2>
          <div id="optionsGrid" class="options-grid"></div>
        </div>

        <button id="nextBtn" style="display: none">Keyingi savol</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
